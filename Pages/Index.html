<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InigoSync</title>
    <link rel="stylesheet" href="../Style/LandingPage.css">
</head>
<body>

    <header>
        <input type="checkbox" id="menu-toggle" class="menu-toggle-checkbox">
        <label for="menu-toggle" class="menu-toggle">
            <img src="../assets/NavBar/more.png" alt="Open menu">
        </label>
        <div class="logo-nav">
            <div class="logo-text">InigoSync</div>
        </div>
        <nav class="nav-menu">
            <ul>
                <li><a href="#" class="active">Home</a></li>
                <li><a href="#">Courts</a></li>
                <li><a href="#">Pricing</a></li>
            </ul>
        </nav>
        <a href="#" class="book-now">Book Now</a>
    </header>

    <main class="hero">
        <div class="content-container">
            <img src="../assets/Logo/Logo.png" alt="InigoSync Logo" class="hero-logo">
            <p class="hero-description">
                A dynamic sports destination designed for athletes, teams, and community events.
                Enjoy modern facilities, competitive courts, and a premium game-day experience.
            </p>
            <div class="cta-buttons">
                <a href="#" class="cta-button">View Courts</a>
                <a href="#" class="cta-button secondary">Join Today</a>
            </div>
        </div>
    </main>

</body>
</html>
